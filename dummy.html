<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sairam Power Tech - Loading Animation</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== PREMIUM ENERGY LOADING ANIMATION CSS ===== */
    .spt-energy-loader {
      --primary: #E30613;
      --accent: #FFC107;
      --dark: #1A1A1A;
      --white: #FFFFFF;
      
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: var(--white);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', 'Poppins', sans-serif;
    }

    .spt-energy-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .spt-loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      max-width: 400px;
      padding: 2rem;
    }

    /* Ring Container */
    .spt-ring-container {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer Ring */
    .spt-ring-outer {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: var(--primary);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: sptRotate 2s linear infinite;
      box-shadow: 0 0 20px rgba(227, 6, 19, 0.2);
    }

    /* Inner Ring */
    .spt-ring-inner {
      position: absolute;
      width: 70%;
      height: 70%;
      border: 3px solid transparent;
      border-bottom-color: var(--accent);
      border-left-color: var(--primary);
      border-radius: 50%;
      animation: sptRotateReverse 3s linear infinite;
      opacity: 0.7;
    }

    /* Energy Pulse */
    .spt-energy-pulse {
      position: absolute;
      width: 120%;
      height: 120%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,193,7,0.2) 0%, transparent 70%);
      animation: sptPulse 2s ease-in-out infinite;
    }

    /* Lightning Bolt */
    .spt-lightning-bolt {
      position: relative;
      z-index: 10;
      animation: sptGlow 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255, 193, 7, 0.5));
    }

    .spt-lightning-bolt svg {
      width: 80px;
      height: 80px;
      animation: sptFloat 3s ease-in-out infinite;
    }

    /* Energy Sparks */
    .spt-spark {
      position: absolute;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent);
      animation: sptSpark 2s ease-out infinite;
    }

    .spt-spark-1 {
      top: 10%;
      right: 10%;
      animation-delay: 0.2s;
    }

    .spt-spark-2 {
      bottom: 15%;
      left: 5%;
      animation-delay: 0.8s;
      width: 4px;
      height: 4px;
    }

    .spt-spark-3 {
      top: 20%;
      left: 0%;
      animation-delay: 1.2s;
      width: 5px;
      height: 5px;
    }

    .spt-spark-4 {
      bottom: 25%;
      right: 0%;
      animation-delay: 1.6s;
      width: 7px;
      height: 7px;
    }

    .spt-spark-5 {
      top: 50%;
      right: -10%;
      animation-delay: 2s;
    }

    /* Loading Text */
    .spt-loading-text {
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--dark);
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1rem;
    }

    .spt-text-static {
      color: var(--dark);
    }

    .spt-dots {
      display: inline-block;
      width: 40px;
      text-align: left;
      animation: sptDots 1.5s steps(4, end) infinite;
      color: var(--primary);
      font-weight: 600;
    }

    /* Energy Bar */
    .spt-energy-bar {
      width: 200px;
      height: 4px;
      background: rgba(227, 6, 19, 0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .spt-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      border-radius: 4px;
      animation: sptFillBar 3s ease-out forwards;
      box-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
    }

    /* Animations */
    @keyframes sptRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes sptRotateReverse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }

    @keyframes sptPulse {
      0%, 100% { 
        transform: scale(1);
        opacity: 0.3;
      }
      50% { 
        transform: scale(1.2);
        opacity: 0.6;
      }
    }

    @keyframes sptGlow {
      0%, 100% { 
        filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.3));
      }
      50% { 
        filter: drop-shadow(0 0 20px rgba(227, 6, 19, 0.5));
      }
    }

    @keyframes sptFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes sptSpark {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
      100% {
        transform: scale(2);
        opacity: 0;
      }
    }

    @keyframes sptDots {
      0%, 20% { opacity: 0.5; }
      40% { opacity: 0.7; }
      60%, 100% { opacity: 1; }
    }

    @keyframes sptFillBar {
      0% { width: 0%; }
      20% { width: 20%; }
      40% { width: 40%; }
      60% { width: 60%; }
      80% { width: 80%; }
      100% { width: 100%; }
    }

    /* Main Content */
    .spt-main-content {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .spt-main-content.visible {
      opacity: 1;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .spt-ring-container {
        width: 150px;
        height: 150px;
      }
      
      .spt-lightning-bolt svg {
        width: 60px;
        height: 60px;
      }
      
      .spt-loading-text {
        font-size: 1.2rem;
      }
      
      .spt-energy-bar {
        width: 180px;
      }
    }

    @media (max-width: 480px) {
      .spt-ring-container {
        width: 120px;
        height: 120px;
      }
      
      .spt-lightning-bolt svg {
        width: 50px;
        height: 50px;
      }
      
      .spt-loading-text {
        font-size: 1rem;
        flex-direction: column;
        gap: 2px;
      }
      
      .spt-energy-bar {
        width: 150px;
      }
      
      .spt-spark {
        transform: scale(0.8);
      }
    }

    /* Reduce motion if user prefers */
    @media (prefers-reduced-motion: reduce) {
      .spt-ring-outer,
      .spt-ring-inner,
      .spt-energy-pulse,
      .spt-lightning-bolt,
      .spt-spark {
        animation: none;
      }
      
      .spt-bar-fill {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- ===== PREMIUM ENERGY LOADING ANIMATION HTML ===== -->
<div class="spt-energy-loader" id="sptEnergyLoader">
  <div class="spt-loader-container">
    
    <!-- Circular Ring Animation -->
    <div class="spt-ring-container">
      <div class="spt-ring-outer"></div>
      <div class="spt-ring-inner"></div>
      <div class="spt-energy-pulse"></div>
      
      <!-- Lightning Bolt Icon -->
      <div class="spt-lightning-bolt">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 2L4 14H12L11 22L20 10H12L13 2Z" fill="#FFC107" stroke="#E30613" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </div>
      
      <!-- Energy Sparks -->
      <div class="spt-spark spt-spark-1"></div>
      <div class="spt-spark spt-spark-2"></div>
      <div class="spt-spark spt-spark-3"></div>
      <div class="spt-spark spt-spark-4"></div>
      <div class="spt-spark spt-spark-5"></div>
    </div>

    <!-- Loading Text with Dots Animation -->
    <div class="spt-loading-text">
      <span class="spt-text-static">Initializing Power Systems</span>
      <span class="spt-dots">...</span>
    </div>

    <!-- Energy Bar (Subtle) -->
    <div class="spt-energy-bar">
      <div class="spt-bar-fill"></div>
    </div>

  </div>
</div>

<!-- ===== MAIN WEBSITE CONTENT (Hidden initially) ===== -->
<div class="spt-main-content" id="sptMainContent" style="display: none;">
  <!-- YOUR ACTUAL WEBSITE CONTENT GOES HERE -->
  <!-- This is where you paste your complete landing page HTML -->
  
 
  <!-- END OF YOUR ACTUAL WEBSITE CONTENT -->
</div>

<!-- ===== PREMIUM ENERGY LOADING ANIMATION JAVASCRIPT ===== -->
<script>
(function() {
  'use strict';

  // Wait for DOM to be ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initEnergyLoader);
  } else {
    initEnergyLoader();
  }

  function initEnergyLoader() {
    const loader = document.getElementById('sptEnergyLoader');
    const mainContent = document.getElementById('sptMainContent');
    
    if (!loader || !mainContent) return;

    // Hide main content initially
    mainContent.style.display = 'block';
    mainContent.classList.remove('visible');

    // Loading duration in milliseconds
    const LOADING_DURATION = 3000; // 3 seconds

    // Animation end handler
    let loadingTimeout = setTimeout(() => {
      // Fade out loader
      loader.classList.add('fade-out');
      
      // Show main content
      mainContent.classList.add('visible');
      
      // Remove loader from DOM after animation completes
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500); // Match CSS transition duration
      
    }, LOADING_DURATION);

    // Handle energy bar animation completion
    const energyBar = document.querySelector('.spt-bar-fill');
    if (energyBar) {
      energyBar.addEventListener('animationend', () => {
        // Optional: Add subtle completion effect
        const rings = document.querySelectorAll('.spt-ring-outer, .spt-ring-inner');
        rings.forEach(ring => {
          ring.style.borderColor = 'transparent';
        });
      });
    }

    // Preload any critical resources
    window.addEventListener('load', () => {
      // Ensure main content is ready
      console.log('Page fully loaded');
    });

    // Fallback for browsers that don't support animation events
    const fallbackTimer = setTimeout(() => {
      if (!loader.classList.contains('fade-out')) {
        loader.classList.add('fade-out');
        mainContent.classList.add('visible');
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }
    }, LOADING_DURATION + 1000); // 4 second fallback

    // Clear fallback if animations complete normally
    setTimeout(() => {
      clearTimeout(fallbackTimer);
    }, LOADING_DURATION + 100);

    // Handle page visibility change
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Page hidden - pause animations
        loader.style.animationPlayState = 'paused';
      } else {
        // Page visible - resume animations
        loader.style.animationPlayState = 'running';
      }
    });

    // Touch device optimization
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    
    if (isTouchDevice) {
      // Ensure smooth performance on touch devices
      loader.style.willChange = 'opacity, transform';
      
      // Add touch event listeners for better interaction
      document.addEventListener('touchstart', () => {
        // Prevent any interference
      }, { passive: true });
    }

    // Optional: Add keyboard accessibility
    document.addEventListener('keydown', (e) => {
      // Allow escape key to skip loader (accessibility)
      if (e.key === 'Escape' && !loader.classList.contains('fade-out')) {
        clearTimeout(loadingTimeout);
        loader.classList.add('fade-out');
        mainContent.classList.add('visible');
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500);
      }
    });

    // Log initialization
    console.log('Energy loader initialized with', LOADING_DURATION/1000, 'seconds duration');
  }
})();
</script>

</body>
</html>
